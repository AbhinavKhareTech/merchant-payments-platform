apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: payments
  labels:
    app: payment-gateway
    tier: critical-path
    domain: payments
spec:
  replicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
        tier: critical-path
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: payment-gateway
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment-gateway
      containers:
        - name: payment-gateway
          image: payments/payment-gateway:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
            - name: admin
              containerPort: 8081
          env:
            - name: JAVA_OPTS
              value: >-
                -XX:+UseZGC
                -XX:MaxRAMPercentage=75.0
                -Djdk.virtualThreadScheduler.parallelism=64
                --enable-preview
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: payments-config
                  key: kafka.bootstrap.servers
            - name: REDIS_CLUSTER_NODES
              valueFrom:
                configMapKeyRef:
                  name: payments-config
                  key: redis.cluster.nodes
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-db
                  key: url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-db
                  key: password
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "12Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health/startup
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Drain in-flight requests before shutdown.
                    # Mark as not-ready, wait for LB to drain, then stop.
                    curl -s -X POST http://localhost:8081/admin/drain
                    sleep 15
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: payments
spec:
  selector:
    app: payment-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-gateway
  namespace: payments
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-gateway
  minReplicas: 6
  maxReplicas: 24
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "5000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-gateway
  namespace: payments
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app: payment-gateway
